# ============================================================
# QuantVista 容器编排示例（宝塔 / Docker Compose）
# 用法：复制为 deploy/docker-compose.yml（已 gitignore），按需调整
# 与 new-api 一致：宿主机 MySQL 通过 host.docker.internal / 172.18.0.1 访问，
# Redis 由本编排内置，应用启动时自动建表与迁移（AutoMigrate）。
# ============================================================
services:
  quantvista:
    image: ${IMAGE:-raoczh/quantvista:custom-YYYYMMDD-01}
    container_name: ${CONTAINER_NAME:-quantvista}
    restart: always
    ports:
      - "${WEB_HTTP_PORT:-3002}:${PORT:-3000}"
    volumes:
      - ${APP_PATH:-/www/wwwroot/quantvista}/data:/data
    environment:
      PORT: ${PORT:-3000}
      SQL_DSN: ${SQL_DSN}
      REDIS_CONN_STRING: ${REDIS_CONN_STRING:-redis://quantvista-redis:6379/0}
      SESSION_SECRET: ${SESSION_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      TRUSTED_PROXIES: ${TRUSTED_PROXIES:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET}
      TUSHARE_TOKEN: ${TUSHARE_TOKEN}
      DEFAULT_MARKET: ${DEFAULT_MARKET:-cn}
      TZ: ${TZ:-Asia/Shanghai}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - quantvista-redis
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O - http://localhost:${PORT:-3000}/api/status | grep -o '\"success\":\\s*true' || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      createdBy: "bt_apps"
    networks:
      - baota_net

  quantvista-redis:
    image: redis:7-alpine
    container_name: quantvista-redis
    restart: always
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ${APP_PATH:-/www/wwwroot/quantvista}/redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      createdBy: "bt_apps"
    networks:
      - baota_net

  # 自建 ntfy 推送服务（Android App 系统级推送，见 docs/DEPLOYMENT.md §8 与 docs/ANDROID_APP_PLAN.md §6）。
  # 首次启动后需进容器初始化用户/授权/token（deny-all 默认拒绝一切匿名访问）。
  quantvista-ntfy:
    image: binwiederhier/ntfy
    container_name: quantvista-ntfy
    restart: always
    command: serve
    environment:
      NTFY_BASE_URL: ${NTFY_BASE_URL:-https://ntfy.example.com}
      NTFY_BEHIND_PROXY: "true"
      NTFY_AUTH_FILE: /var/lib/ntfy/auth.db
      NTFY_AUTH_DEFAULT_ACCESS: deny-all # 私有实例：默认全拒，显式授权
      NTFY_CACHE_FILE: /var/lib/ntfy/cache.db
      NTFY_ATTACHMENT_CACHE_DIR: /var/lib/ntfy/attachments
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "3003:80" # 避开 3001(new-api)/3002(quantvista)
    volumes:
      - ${APP_PATH:-/www/wwwroot/quantvista}/ntfy:/var/lib/ntfy
    labels:
      createdBy: "bt_apps"
    networks:
      - baota_net

networks:
  baota_net:
    external: true
